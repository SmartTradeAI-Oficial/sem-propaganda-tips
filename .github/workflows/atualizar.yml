name: Atualizar palpites diariamente

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar requests
        run: pip install requests

      - name: Rodar script
        env:
          API_FOOTBALL: ${{ secrets.API_FOOTBALL }}
        run: python script_palpites.py

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add palpites.json
          if git diff --staged --quiet; then
            echo "Nenhuma alteração."
          else
            git commit -m "Palpites atualizados automaticamente"
            git push
          fi
