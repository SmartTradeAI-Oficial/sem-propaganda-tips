name: Atualizar palpites diariamente

on:
  schedule:
    - cron: '0 12 * * *'   # todo dia às 12:00 UTC
  workflow_dispatch:         # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar requests
        run: pip install requests

      - name: Rodar script
        run: python script_palpites.py

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add palpites.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Palpites atualizados" && git push)
