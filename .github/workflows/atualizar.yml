name: Atualizar palpites diariamente

on:
  schedule:
    - cron: '0 12 * * *'   # todo dia às 12:00 UTC
  workflow_dispatch:

# Permissão de escrita para o token automático
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar requests
        run: pip install requests

      - name: Rodar script
        run: python script_palpites.py

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add palpites.json
          # Se houver alterações, faz commit e push
          if git diff --staged --quiet; then
            echo "Nenhuma alteração, não precisa commitar."
          else
            git commit -m "Palpites atualizados automaticamente"
            git push
          fi
